<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Actions deployment permission policy</title>
  <desc id="desc">Instructional mock screen showing permission areas for GitHub Actions deployment role.</desc>
  <rect width="1200" height="720" fill="#f6f7f9"/>
  <rect width="1200" height="56" fill="#232f3e"/>
  <text x="28" y="36" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">AWS IAM - Permissions</text>
  <text x="70" y="112" fill="#111827" font-family="Arial, sans-serif" font-size="30" font-weight="700">Attach least-privilege deployment permissions</text>
  <rect x="70" y="150" width="1060" height="440" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="100" y="195" fill="#111827" font-family="Arial, sans-serif" font-size="20" font-weight="700">Deployment role can manage only required services</text>
  <g font-family="Arial, sans-serif" font-size="17" fill="#111827">
    <rect x="105" y="230" width="450" height="54" rx="6" fill="#eaf2ff" stroke="#60a5fa"/>
    <text x="130" y="264">S3: create bucket, put object, encryption, public access block</text>
    <rect x="105" y="305" width="450" height="54" rx="6" fill="#ecfdf5" stroke="#10b981"/>
    <text x="130" y="339">Lambda: create function, update function code, read status</text>
    <rect x="105" y="380" width="450" height="54" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="130" y="414">Glue: create/update jobs, crawlers, databases, tables</text>
    <rect x="105" y="455" width="450" height="54" rx="6" fill="#fce7f3" stroke="#ec4899"/>
    <text x="130" y="489">CloudWatch: read logs for troubleshooting</text>
    <rect x="625" y="230" width="420" height="128" rx="6" fill="#fff7ed" stroke="#f97316"/>
    <text x="650" y="265" font-weight="700">iam:PassRole</text>
    <text x="650" y="300">Allows GitHub Actions to pass approved</text>
    <text x="650" y="326">Lambda and Glue execution roles.</text>
    <rect x="625" y="390" width="420" height="119" rx="6" fill="#fee2e2" stroke="#ef4444"/>
    <text x="650" y="425" font-weight="700">Avoid AdministratorAccess</text>
    <text x="650" y="460">Use scoped permissions for class demos</text>
    <text x="650" y="486">and tighter permissions for production.</text>
  </g>
  <rect x="70" y="620" width="1060" height="48" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="98" y="650" fill="#374151" font-family="Arial, sans-serif" font-size="16">Explain: least privilege means the role gets only the actions and resources needed for this project.</text>
</svg>
