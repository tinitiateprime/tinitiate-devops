<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Create GitHub OIDC provider in IAM</title>
  <desc id="desc">Instructional mock screen showing IAM identity provider values for GitHub Actions OIDC.</desc>
  <rect width="1200" height="720" fill="#f6f7f9"/>
  <rect width="1200" height="56" fill="#232f3e"/>
  <text x="28" y="36" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">AWS Console - IAM</text>
  <text x="72" y="115" fill="#111827" font-family="Arial, sans-serif" font-size="32" font-weight="700">Add identity provider</text>
  <rect x="72" y="155" width="1056" height="445" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="105" y="205" fill="#111827" font-family="Arial, sans-serif" font-size="20" font-weight="700">Provider type</text>
  <rect x="105" y="225" width="320" height="42" rx="4" fill="#eaf2ff" stroke="#0969da"/>
  <text x="124" y="252" fill="#0969da" font-family="Arial, sans-serif" font-size="16" font-weight="700">OpenID Connect</text>
  <text x="105" y="315" fill="#111827" font-family="Arial, sans-serif" font-size="20" font-weight="700">Provider URL</text>
  <rect x="105" y="335" width="760" height="44" rx="4" fill="#f9fafb" stroke="#9ca3af"/>
  <text x="124" y="363" fill="#111827" font-family="Consolas, monospace" font-size="17">https://token.actions.githubusercontent.com</text>
  <text x="105" y="430" fill="#111827" font-family="Arial, sans-serif" font-size="20" font-weight="700">Audience</text>
  <rect x="105" y="450" width="760" height="44" rx="4" fill="#f9fafb" stroke="#9ca3af"/>
  <text x="124" y="478" fill="#111827" font-family="Consolas, monospace" font-size="17">sts.amazonaws.com</text>
  <rect x="105" y="535" width="220" height="46" rx="5" fill="#ff9900"/>
  <text x="142" y="565" fill="#111827" font-family="Arial, sans-serif" font-size="17" font-weight="700">Add provider</text>
  <rect x="72" y="625" width="1056" height="56" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="100" y="660" fill="#065f46" font-family="Arial, sans-serif" font-size="17">Explain: this lets GitHub request short-lived AWS credentials without storing access keys.</text>
</svg>
