<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Do not use root credentials warning screen</title>
  <desc id="desc">Instructional mock screen explaining why root credentials must not be used for the capstone.</desc>
  <rect width="1200" height="720" fill="#f6f7f9"/>
  <rect width="1200" height="56" fill="#232f3e"/>
  <text x="28" y="36" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">AWS Security Guidance</text>
  <rect x="110" y="110" width="980" height="500" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <circle cx="190" cy="195" r="45" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
  <text x="174" y="210" fill="#b91c1c" font-family="Arial, sans-serif" font-size="42" font-weight="700">!</text>
  <text x="260" y="185" fill="#111827" font-family="Arial, sans-serif" font-size="32" font-weight="700">Do not use root credentials</text>
  <text x="260" y="225" fill="#4b5563" font-family="Arial, sans-serif" font-size="18">Root credentials have full account access and should not be used for daily work or automation.</text>
  <rect x="155" y="290" width="390" height="210" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="185" y="330" fill="#991b1b" font-family="Arial, sans-serif" font-size="22" font-weight="700">Bad practice</text>
  <text x="185" y="370" fill="#7f1d1d" font-family="Arial, sans-serif" font-size="17">Store root access keys in GitHub</text>
  <text x="185" y="405" fill="#7f1d1d" font-family="Arial, sans-serif" font-size="17">Use root for deployments</text>
  <text x="185" y="440" fill="#7f1d1d" font-family="Arial, sans-serif" font-size="17">Give every service administrator access</text>
  <rect x="655" y="290" width="390" height="210" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="685" y="330" fill="#065f46" font-family="Arial, sans-serif" font-size="22" font-weight="700">Good practice</text>
  <text x="685" y="370" fill="#064e3b" font-family="Arial, sans-serif" font-size="17">Use IAM roles and short-lived credentials</text>
  <text x="685" y="405" fill="#064e3b" font-family="Arial, sans-serif" font-size="17">Use GitHub OIDC</text>
  <text x="685" y="440" fill="#064e3b" font-family="Arial, sans-serif" font-size="17">Follow least privilege</text>
  <rect x="110" y="645" width="980" height="45" rx="6" fill="#fff7ed" stroke="#f97316"/>
  <text x="138" y="674" fill="#9a3412" font-family="Arial, sans-serif" font-size="16">Explain: root is for account recovery and emergency administration, not application deployments.</text>
</svg>
