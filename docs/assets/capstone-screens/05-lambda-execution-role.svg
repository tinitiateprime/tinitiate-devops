<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Lambda execution role screen</title>
  <desc id="desc">Instructional mock screen showing Lambda execution role trust and permissions.</desc>
  <rect width="1200" height="720" fill="#f6f7f9"/>
  <rect width="1200" height="56" fill="#232f3e"/>
  <text x="28" y="36" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">AWS IAM - Lambda role</text>
  <text x="70" y="112" fill="#111827" font-family="Arial, sans-serif" font-size="30" font-weight="700">Role: lambda-claims-validator-role</text>
  <rect x="70" y="150" width="500" height="430" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="100" y="195" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">Trust policy</text>
  <rect x="100" y="225" width="420" height="82" rx="6" fill="#eaf2ff" stroke="#60a5fa"/>
  <text x="125" y="260" fill="#111827" font-family="Consolas, monospace" font-size="17">Service: lambda.amazonaws.com</text>
  <text x="125" y="286" fill="#374151" font-family="Arial, sans-serif" font-size="15">Lambda can assume this role at runtime.</text>
  <rect x="630" y="150" width="500" height="430" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="660" y="195" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">Permission policy</text>
  <text x="660" y="240" fill="#111827" font-family="Arial, sans-serif" font-size="17">Minimum permissions:</text>
  <text x="690" y="282" fill="#374151" font-family="Arial, sans-serif" font-size="17">1. logs:CreateLogGroup</text>
  <text x="690" y="318" fill="#374151" font-family="Arial, sans-serif" font-size="17">2. logs:CreateLogStream</text>
  <text x="690" y="354" fill="#374151" font-family="Arial, sans-serif" font-size="17">3. logs:PutLogEvents</text>
  <text x="690" y="390" fill="#374151" font-family="Arial, sans-serif" font-size="17">4. Optional s3:GetObject for validation</text>
  <rect x="70" y="620" width="1060" height="48" rx="6" fill="#ecfdf5" stroke="#10b981"/>
  <text x="98" y="650" fill="#065f46" font-family="Arial, sans-serif" font-size="16">Explain: the Lambda role is used by the function while it runs, not by GitHub Actions.</text>
</svg>
