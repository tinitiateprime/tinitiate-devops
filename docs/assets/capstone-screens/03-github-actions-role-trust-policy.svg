<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Actions role trust policy</title>
  <desc id="desc">Instructional mock screen showing trust policy for GitHub Actions AWS deployment role.</desc>
  <rect width="1200" height="720" fill="#f6f7f9"/>
  <rect width="1200" height="56" fill="#232f3e"/>
  <text x="28" y="36" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">AWS IAM - Create role</text>
  <text x="70" y="112" fill="#111827" font-family="Arial, sans-serif" font-size="30" font-weight="700">Role: github-actions-aws-deploy-role</text>
  <rect x="70" y="150" width="1060" height="500" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="100" y="190" fill="#111827" font-family="Arial, sans-serif" font-size="21" font-weight="700">Trust policy</text>
  <rect x="100" y="215" width="1000" height="390" rx="6" fill="#111827"/>
  <text x="125" y="250" fill="#e5e7eb" font-family="Consolas, monospace" font-size="15">{</text>
  <text x="145" y="280" fill="#e5e7eb" font-family="Consolas, monospace" font-size="15">"Effect": "Allow",</text>
  <text x="145" y="310" fill="#e5e7eb" font-family="Consolas, monospace" font-size="15">"Principal": {"Federated": "arn:aws:iam::ACCOUNT:oidc-provider/token.actions.githubusercontent.com"},</text>
  <text x="145" y="340" fill="#e5e7eb" font-family="Consolas, monospace" font-size="15">"Action": "sts:AssumeRoleWithWebIdentity",</text>
  <text x="145" y="370" fill="#e5e7eb" font-family="Consolas, monospace" font-size="15">"Condition": {</text>
  <text x="170" y="400" fill="#93c5fd" font-family="Consolas, monospace" font-size="15">"token.actions.githubusercontent.com:aud": "sts.amazonaws.com",</text>
  <text x="170" y="430" fill="#93c5fd" font-family="Consolas, monospace" font-size="15">"token.actions.githubusercontent.com:sub": "repo:ORG/REPO:*"</text>
  <text x="145" y="460" fill="#e5e7eb" font-family="Consolas, monospace" font-size="15">}</text>
  <text x="125" y="490" fill="#e5e7eb" font-family="Consolas, monospace" font-size="15">}</text>
  <rect x="100" y="620" width="1000" height="46" rx="6" fill="#fff7ed" stroke="#f97316"/>
  <text x="125" y="649" fill="#9a3412" font-family="Arial, sans-serif" font-size="16">Teaching point: trust policy says who can assume the role. Permission policy says what the role can do.</text>
</svg>
