<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Actions workflow run sequence</title>
  <desc id="desc">Instructional mock screen showing the order to run capstone GitHub Actions workflows.</desc>
  <rect width="1200" height="720" fill="#f6f8fa"/>
  <rect width="1200" height="58" fill="#24292f"/>
  <text x="28" y="37" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">GitHub Actions</text>
  <text x="70" y="110" fill="#111827" font-family="Arial, sans-serif" font-size="30" font-weight="700">Run workflows in this order</text>
  <rect x="70" y="150" width="1060" height="470" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <g font-family="Arial, sans-serif">
    <rect x="120" y="205" width="220" height="72" rx="8" fill="#eaf2ff" stroke="#0969da"/>
    <text x="145" y="235" fill="#0969da" font-size="17" font-weight="700">1. S3 workflow</text>
    <text x="145" y="260" fill="#374151" font-size="14">Create bucket and prefixes</text>
    <path d="M350 241 H440" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="455" y="205" width="220" height="72" rx="8" fill="#ecfdf5" stroke="#10b981"/>
    <text x="480" y="235" fill="#065f46" font-size="17" font-weight="700">2. Upload data</text>
    <text x="480" y="260" fill="#374151" font-size="14">claims_sample.csv to bronze</text>
    <path d="M685 241 H775" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="790" y="205" width="220" height="72" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="815" y="235" fill="#92400e" font-size="17" font-weight="700">3. Lambda workflow</text>
    <text x="815" y="260" fill="#374151" font-size="14">Deploy validator function</text>
    <rect x="120" y="365" width="220" height="72" rx="8" fill="#fce7f3" stroke="#ec4899"/>
    <text x="145" y="395" fill="#9d174d" font-size="17" font-weight="700">4. Glue workflow</text>
    <text x="145" y="420" fill="#374151" font-size="14">Deploy and run ETL job</text>
    <path d="M350 401 H440" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="455" y="365" width="220" height="72" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="480" y="395" fill="#5b21b6" font-size="17" font-weight="700">5. Crawler workflow</text>
    <text x="480" y="420" fill="#374151" font-size="14">Create catalog and table</text>
    <path d="M685 401 H775" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="790" y="365" width="220" height="72" rx="8" fill="#dcfce7" stroke="#22c55e"/>
    <text x="815" y="395" fill="#166534" font-size="17" font-weight="700">6. Athena queries</text>
    <text x="815" y="420" fill="#374151" font-size="14">Validate row counts</text>
  </g>
  <rect x="70" y="645" width="1060" height="45" rx="6" fill="#fff7ed" stroke="#f97316"/>
  <text x="98" y="674" fill="#9a3412" font-family="Arial, sans-serif" font-size="16">Explain: each workflow automates one part of the deployment pipeline.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
